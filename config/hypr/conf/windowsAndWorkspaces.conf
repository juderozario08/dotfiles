##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules
# Ignore maximize requests from apps. You'll probably like this.

windowrulev2 = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrulev2 = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0
#
# Pavucontrol floating
windowrulev2 = float,class:(.*org.pulseaudio.pavucontrol.*)
windowrulev2 = size 700 600,class:(.*org.pulseaudio.pavucontrol.*)
windowrulev2 = center,class:(.*org.pulseaudio.pavucontrol.*)
windowrulev2 = pin,class:(.*org.pulseaudio.pavucontrol.*)

# System Mission Center Preference Window
windowrulev2 = float, class:(missioncenter), title:^(Preferences)$
windowrulev2 = pin, class:(missioncenter), title:^(Preferences)$
windowrulev2 = center, class:(missioncenter), title:^(Preferences)$
windowrulev2 = size 900 600, class:(io.missioncenter.MissionCenter)

windowrulev2 = float, title:^(.*System\ Monitor.*)$
windowrulev2 = pin, title:^(.*System\ Monitor.*)$
windowrulev2 = center, title:^(.*System\ Monitor.*)$
windowrulev2 = size 900 600, title:^(.*System\ Monitor.*)$

# Hyprland Share Picker
windowrulev2 = float, class:(hyprland-share-picker)
windowrulev2 = pin, class:(hyprland-share-picker)
windowrulev2 = center, title:class:(hyprland-share-picker)
windowrulev2 = size 600 400,class:(hyprland-share-picker)

windowrulev2 = float, title:(.*Bluetooth.*)
windowrulev2 = size 600 400,title:(.*Bluetooth.*)

windowrulev2 = float, title:(.*Picture-in-Picture.*)

windowrulev2 = float, title:(.*nwg-look.*)
windowrulev2 = size 800 600,title:(.*nwg-look.*)

windowrulev2 = float, title:(.*Open Folder.*)
windowrulev2 = center, title:(.*Open Folder.*)

windowrulev2 = float, title:(.*Open folder as vault.*)
windowrulev2 = center, title:(.*Open folder as vault.*)

windowrulev2 = float, title:(.*Emulator.*)
windowrulev2 = float, title:(.*Calendar.*)
windowrulev2 = float, title:(.*Calculator.*)
