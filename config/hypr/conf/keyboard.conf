# -----------------------------------------------------
# Keyboard Layout
# https://wiki.hyprland.org/Configuring/Variables/#input
# -----------------------------------------------------
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    numlock_by_default = true
    mouse_refocus = false
    follow_mouse = 2
    touchpad {
        natural_scroll = false
        scroll_factor = 1.0
    }
    sensitivity = 0
}

gestures {
    workspace_swipe = true
}
